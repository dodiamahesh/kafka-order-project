# ═══════════════════════════════════════════════════════════
#  Application Config
# ═══════════════════════════════════════════════════════════
spring.application.name=kafka-order-backend
server.port=8080

# ═══════════════════════════════════════════════════════════
#  H2 Database (In-Memory — no setup required!)
# ═══════════════════════════════════════════════════════════
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console — visit http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ═══════════════════════════════════════════════════════════
#  Apache Kafka Configuration
# ═══════════════════════════════════════════════════════════
spring.kafka.bootstrap-servers=localhost:9092

# ── Producer Settings ──
# key-serializer: converts Java keys to bytes for Kafka
# value-serializer: converts Java objects (JSON) to bytes
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# ── Consumer Settings ──
# group-id: identifies your consumer group (load-balanced across group members)
# auto-offset-reset: "earliest" = read from beginning if no offset exists
spring.kafka.consumer.group-id=order-processor-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.kafkaorder.dto

# ── Topic Names (referenced in code via @Value) ──
kafka.topic.order-placed=order-placed
kafka.topic.order-processed=order-processed

# ═══════════════════════════════════════════════════════════
#  CORS (Allow Angular dev server)
# ═══════════════════════════════════════════════════════════
app.cors.allowed-origins=http://localhost:4200


